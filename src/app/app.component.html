<app-login *ngIf="authLoaded && currentUser === null"></app-login>

<div class="app-shell" *ngIf="authLoaded && currentUser !== null">

  <!-- Toast notifications -->
  <app-toast></app-toast>

  <!-- Main content area -->
  <div class="app-content">
    <header class="topbar" [style.background-image]="'url(assets/green-swirl.png)'">
      <div class="topbar-inner">
        <div class="topbar-title">
          <h1><span class="brand-orange">TR</span>ack Board</h1>
        </div>

      </div>
    </header>
    <!-- Side navigation -->
    <nav class="sidenav">
      <div class="sidenav-items">
        <img src="assets/kinesis.svg" height="30" alt="Thomson Reuters kinesis" class="tr-kinesis">

        <button class="sidenav-btn" [class.active]="currentView === 'dashboard'"
                (click)="navigateTo('dashboard')" data-label="Dashboard" aria-label="Dashboard"
                [appTouchTooltip]="'Dashboard'" touchTooltipAlign="bottom-right">
          <i class="fas fa-house"></i>
        </button>

        <button class="sidenav-btn" [class.active]="currentView === 'connections'"
                (click)="navigateTo('connections')" data-label="Connections" aria-label="Connections"
                [appTouchTooltip]="'Connections'" touchTooltipAlign="bottom-right">
          <i class="fas fa-plug"></i>
        </button>

        <button class="sidenav-btn" [class.active]="currentView === 'journal'"
                (click)="navigateTo('journal')" data-label="Journal" aria-label="Journal"
                [appTouchTooltip]="'Journal'" touchTooltipAlign="bottom-right">
          <i class="fas fa-book-open"></i>
        </button>

        <button class="sidenav-btn" [class.active]="currentView === 'goals'"
                (click)="navigateTo('goals')" data-label="Yearly Goals" aria-label="Yearly Goals"
                [appTouchTooltip]="'Yearly Goals'" touchTooltipAlign="bottom-right">
          <i class="fas fa-bullseye"></i>
        </button>

        <button class="sidenav-btn" [class.active]="currentView === 'tasks'"
                (click)="navigateTo('tasks')" data-label="Tasks" aria-label="Tasks"
                [appTouchTooltip]="'Tasks'" touchTooltipAlign="bottom-right">
          <i class="fas fa-check-square"></i>
        </button>

        <button class="sidenav-btn" [class.active]="currentView === 'open-arena-chat'"
                (click)="navigateTo('open-arena-chat')" data-label="Open Arena Chat" aria-label="Open Arena Chat"
                [appTouchTooltip]="'Open Arena Chat'" touchTooltipAlign="bottom-right">
          <i class="fas fa-robot"></i>
        </button>
      </div>

      <div class="sidenav-bottom">
        <!-- GitHub AI status -->
        <button class="sidenav-btn ai-status-btn"
                [class.ai-connected]="isAIServiceValid && !isRateLimitExceeded"
                [class.ai-exceeded]="isAIServiceValid && isRateLimitExceeded"
                [class.ai-disconnected]="!isAIConnected || hasTokenError"
                (click)="navigateTo('connections')"
                [attr.aria-label]="isAIServiceValid ? 'GitHub AI: ' + (rateLimit?.callsUsed ?? 0) + ' calls used' : 'GitHub AI not configured'"
                [attr.data-label]="isAIServiceValid ? 'AI: ' + (rateLimit?.callsUsed ?? 0) + ' calls' : 'GitHub AI not configured'"
                [appTouchTooltip]="isAIServiceValid ? 'AI: ' + (rateLimit?.callsUsed ?? 0) + ' calls' : 'GitHub AI not configured'"
                touchTooltipAlign="bottom-left">
          <i class="fab fa-github"></i>
          <span class="ai-dot"
                [class.connected]="isAIServiceValid && !isRateLimitExceeded"
                [class.exceeded]="isAIServiceValid && isRateLimitExceeded"
                [class.disconnected]="!isAIConnected || hasTokenError"></span>
        </button>

        <button class="sidenav-btn" (click)="logout()" data-label="Sign Out" aria-label="Sign Out"
                [appTouchTooltip]="'Sign Out'" touchTooltipAlign="bottom-left">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>

      <!-- Setup Prompt Popover -->
      <div class="setup-prompt" *ngIf="showSetupPrompt && (!isAIConnected || hasTokenError)">
        <div class="prompt-content">
          <i class="fas fa-info-circle"></i>
          <p>{{ hasTokenError ? 'GitHub AI token is invalid or expired.' : 'GitHub AI features are not configured.' }}</p>
          <button class="btn-primary" (click)="scrollToAIWidget(); showSetupPrompt = false">
            <i class="fas fa-cog"></i>
            Set Up Now
          </button>
        </div>
      </div>
    </nav>
    <main class="page-body">
      <app-dashboard *ngIf="currentView === 'dashboard'"></app-dashboard>
      <app-connections *ngIf="currentView === 'connections'"></app-connections>
      <app-journal *ngIf="currentView === 'journal'"></app-journal>
      <app-goals *ngIf="currentView === 'goals'"></app-goals>
      <app-tasks *ngIf="currentView === 'tasks'"></app-tasks>
      <app-open-arena-chat *ngIf="currentView === 'open-arena-chat'"></app-open-arena-chat>
    </main>
  </div>

</div>
