<div class="ask-widget">

  <!-- ── Landing hero (empty state) ─────────────────────────── -->
  <div class="chat-landing" *ngIf="conversationHistory.length === 0 && !loading && !anySkillLoading">
    <h2 class="landing-heading">{{ greeting }}! What do you want to do?</h2>
  </div>

  <!-- ── Conversation ─────────────────────────────────────────── -->
  <div class="conversation-wrapper" #chatContainer [class.expanded]="conversationExpanded" *ngIf="conversationHistory.length > 0 || loading || anySkillLoading">
    <div class="conversation-fade-top" *ngIf="!conversationExpanded"></div>
    <button
      type="button"
      class="conversation-toggle-btn"
      (click)="conversationExpanded = !conversationExpanded"
      [attr.aria-label]="conversationExpanded ? 'Collapse conversation' : 'Expand full conversation'">
      <i class="fas" [class.fa-chevron-up]="!conversationExpanded" [class.fa-chevron-down]="conversationExpanded"></i>
    </button>

    <div class="conversation">
      <ng-container *ngFor="let msg of conversationHistory; let i = index">
        <div class="msg" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          <div class="msg-meta">
            <span class="msg-label">{{ msg.role === 'user' ? 'You' : 'Agent' }}</span>
            <span class="msg-time">{{ formatTimestamp(msg.timestamp) }}</span>
          </div>
          <div class="msg-body"
            *ngIf="msg.role === 'assistant'"
            [innerHTML]="formatMessage(msg.content)"></div>
          <div class="msg-body plain" *ngIf="msg.role === 'user'">{{ msg.content }}</div>
          <button
            *ngIf="msg.role === 'assistant'"
            type="button"
            class="msg-copy-btn"
            (click)="copyMessage(msg.content, i)"
            [attr.data-label]="copiedMsgIndex === i ? 'Copied!' : 'Copy'"
            [attr.aria-label]="copiedMsgIndex === i ? 'Copied!' : 'Copy message'">
            <i class="fas" [class.fa-check]="copiedMsgIndex === i" [class.fa-copy]="copiedMsgIndex !== i"></i>
          </button>
        </div>
      </ng-container>
      <ng-container *ngIf="conversationHistory.length > 0">
        <!-- Initial broom button -->
        <button
          *ngIf="!confirmClear"
          type="button"
          class="toolbar-clear-btn"
          (click)="confirmClear = true"
          [disabled]="loading || anySkillLoading"
          touchTooltipAlign="left"
          data-label="Clear conversation"
          aria-label="Clear conversation">
          <i class="fas fa-broom"></i>
        </button>
        <!-- Confirm row -->
        <div *ngIf="confirmClear" class="clear-confirm-row">
          <span class="clear-confirm-label">Clear chat?</span>
          <button type="button" class="clear-confirm-yes" (click)="clearConversation()" aria-label="Yes, clear">
            <i class="fas fa-check"></i>
          </button>
          <button type="button" class="clear-confirm-no" (click)="confirmClear = false" aria-label="Cancel">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </ng-container>

      <!-- Thinking indicator -->
      <div class="msg assistant thinking" *ngIf="loading || anySkillLoading">
        <div class="msg-meta">
          <span class="msg-label">AI</span>
        </div>
        <div class="msg-body thinking-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error ──────────────────────────────────────────────────── -->
  <div class="error-row" *ngIf="error">
    <i class="fas fa-exclamation-triangle"></i> {{ error }}
  </div>

  <!-- ── Input card ────────────────────────────────────────────── -->
  <div class="input-card" *ngIf="isConfigured">
    <textarea
      class="card-textarea"
      [(ngModel)]="question"
      (keydown)="onKeydown($event)"
      placeholder="Ask the agent..."
      rows="3"
      [disabled]="loading || anySkillLoading"
      aria-label="Ask AI a question"></textarea>

    <div class="card-toolbar">
      <div class="toolbar-left">
        <button type="button" class="toolbar-icon-btn"
          data-label="Context: journal, tasks, goals & calendar"
          [appTouchTooltip]="'Context: journal, tasks, goals & calendar'"
          touchTooltipAlign="bottom-right"
          aria-label="Context: journal, tasks, goals and calendar included">
          <i class="fas fa-database"></i>
        </button>
        <span class="toolbar-divider"></span>
        <div class="skills-dropdown-wrapper" #skillsDropdownWrapper>
          <button
            type="button"
            class="toolbar-skills-btn"
            [class.open]="showSkillsDropdown"
            (click)="showSkillsDropdown = !showSkillsDropdown"
            [disabled]="loading || anySkillLoading">
            <i class="fas fa-bolt"></i>
            Skills
            <i class="fas fa-chevron-down"></i>
          </button>
          <div class="skills-dropdown" *ngIf="showSkillsDropdown">
            <button
              *ngFor="let skill of skills"
              type="button"
              class="skill-dropdown-item"
              (click)="runSkill(skill.id); showSkillsDropdown = false"
              [disabled]="loading || anySkillLoading">
              <span class="skill-item-header">
                <i [class]="skill.icon"></i>
                {{ skill.label }}
              </span>
              <span class="skill-item-desc">{{ skill.description }}</span>
            </button>
            <div *ngIf="conversationHistory.length > 0" class="skills-dropdown-footer">
              <ng-container *ngIf="!confirmClear">
                <button type="button" class="clear-dropdown-btn" (click)="confirmClear = true; showSkillsDropdown = false">
                  <i class="fas fa-broom"></i> Clear conversation
                </button>
              </ng-container>
            </div>
          </div>
        </div>
      </div>

      <button
        class="send-btn-circle"
        (click)="ask()"
        [disabled]="!question.trim() || loading || anySkillLoading"
        aria-label="Send">
        <i class="fas fa-paper-plane" *ngIf="!loading && !anySkillLoading"></i>
        <i class="fas fa-circle-notch fa-spin" *ngIf="loading || anySkillLoading"></i>
      </button>
    </div>
  </div>

  <!-- ── Not configured ─────────────────────────────────────────── -->
  <div class="not-configured" *ngIf="!isConfigured">
    <i class="fas fa-key"></i>
    GitHub AI token not configured. Go to <strong>Connections</strong> to set it up.
  </div>

</div>
