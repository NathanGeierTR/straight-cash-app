<div class="journal-widget">
  <div class="entry-form">
    <textarea
      #entryTextarea
      [(ngModel)]="entryText"
      (keydown)="onKeyDown($event)"
      placeholder="Write a journal entry... (Ctrl+Enter to submit)"
      rows="3"
      class="entry-textarea"
      [disabled]="isSubmitting">
    </textarea>
    <button class="btn-submit" (click)="submitEntry()" [disabled]="!entryText.trim() || isSubmitting">
      <i class="fas fa-paper-plane"></i>
      <span>{{ isSubmitting ? 'Saving...' : 'Save Entry' }}</span>
    </button>
  </div>

  <div class="recent-entries" *ngIf="recentEntries.length > 0">
    <h4 class="recent-label">Recent</h4>
    <div class="entry-item" *ngFor="let entry of recentEntries">
      <span class="entry-time">{{ entry.timestamp | date:'MMM d, h:mm a' }}</span>
      <p class="entry-text">{{ entry.text }}</p>
    </div>
  </div>
</div>
